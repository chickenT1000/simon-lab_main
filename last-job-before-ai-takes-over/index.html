<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="A private Simon Lab recruiting chat for systems builders.">
    <meta name="robots" content="noindex,nofollow">
    <link rel="canonical" href="https://simon-lab.org/last-job-before-ai-takes-over/">
    <title>Simon Lab — Private Chat</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/" aria-label="Simon Lab home">
            <picture class="brand-logo">
                <source srcset="/assets/logo-dark.svg" media="(prefers-color-scheme: dark)">
                <img src="/assets/logo-light.svg" alt="Simon Lab">
            </picture>
        </a>
        <nav class="top-actions" aria-label="Chat actions">
            <button type="button" disabled>New chat</button>
            <span class="share-wrap">
                <button id="shareButton" type="button">Share</button>
                <span id="toast" class="share-toast" role="status" aria-live="polite" hidden></span>
            </span>
        </nav>
    </header>

    <main class="page-shell">
        <section class="intro" aria-label="Private recruiting prompt">
            <p class="eyebrow">last job before AI takes over</p>
            <h1>Some people will slow this down. A few will accelerate it.</h1>
        </section>

        <section id="chatLog" class="chat-log" role="log" aria-live="polite" aria-label="Conversation"></section>
    </main>

    <footer class="composer-shell" aria-label="Message composer">
        <form id="composerForm" class="composer">
            <textarea id="composerInput" rows="1" placeholder="Message Simon Lab…" aria-label="Message Simon Lab"></textarea>
            <button id="sendButton" type="submit" aria-label="Send message">
                <span aria-hidden="true">↑</span>
            </button>
        </form>
    </footer>

    <div id="contactModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
        <div class="modal-backdrop" data-close-modal></div>
        <section class="modal-card" tabindex="-1">
            <button class="modal-close" type="button" aria-label="Close" data-close-modal>×</button>
            <h2 id="modalTitle">Reach out</h2>
            <p class="modal-email"><a href="mailto:szymon.wojciechowski@simon-lab.org">szymon.wojciechowski@simon-lab.org</a></p>
            <button id="copyEmail" class="copy-button" type="button">Copy email</button>
            <p id="copyStatus" class="copy-status" role="status" aria-live="polite"></p>
        </section>
    </div>

    <script src="script.js"></script>
    <script src="/js/visitor-counter.js" data-counter-key="simon-lab.org/last-job-before-ai-takes-over"></script>
</body>
</html>
